                          - heading "Strategic Partnership for Advanced HCC Development" [level=2]
                          - paragraph: Johnson's Medical presents this proposal as a strategic development partner committed to advancing Vericel BioPharma's investigational HCC program with the scientific rigor, operational precision, and regulatory acumen this indication demands. We recognize that advanced hepatocellular carcinoma represents one of the most clinically and operationally complex oncology indications in drug development — characterized by medically vulnerable patient populations, intensely competitive enrollment landscapes, and regulatory expectations that vary meaningfully across global jurisdictions. This proposal has been designed specifically for that complexity.
                          - paragraph: Our engagement model differs fundamentally from transactional service arrangements. We invest in program architecture, participate in foundational strategic decisions, and maintain accountability for outcomes across every operational and regulatory milestone. The solution set presented here reflects deep familiarity with HCC development programs, informed by our track record in hepatic malignancy and structured to optimize Vericel BioPharma's path to a credible, submission-ready data package.
                          - separator
                          - heading "The Clinical and Operational Landscape" [level=2]
                          - paragraph: Advanced HCC is the third leading cause of cancer mortality globally, representing 75–85% of all primary liver cancers. While immune checkpoint inhibitor combinations have advanced the treatment paradigm, durable response rates remain limited and the unmet medical need for novel, differentiated therapeutics is substantial. Realizing this opportunity requires a development program engineered for HCC's inherent complexity from the outset.
                          - paragraph: "Four critical challenges define this indication and require specialized methodology rather than generalist oncology capability:"
                          - paragraph:
                            - strong [ref=e355]: Patient Population Complexity
                            - text: HCC populations are characterized by underlying hepatic dysfunction, comorbid portal hypertension, and etiologically heterogeneous disease that varies significantly across geographies. Child-Pugh and ALBI stratification requirements, combined with etiology-driven subgroup representation obligations, demand experienced investigators and infrastructure specifically designed for managing medically fragile patients throughout experimental therapy.
                          - paragraph:
                            - strong [ref=e356]: Competitive Enrollment Pressure
                            - text: Multiple concurrent HCC trials compete for the same investigator relationships and patient populations at highest-volume global sites. Success requires intelligence-driven site selection, differentiated investigator engagement, and adaptive enrollment strategies that secure competitive access throughout the enrollment period.
                          - paragraph:
                            - strong [ref=e357]: Regulatory Complexity Across Jurisdictions
                            - text: FDA, EMA, PMDA, and NMPA maintain distinct and evolving expectations for HCC trial design, endpoint selection, and liver function representation. Whether pursuing regular approval (OS-anchored) or accelerated pathways (ORR/duration of response), regulatory alignment must be established at the protocol level. Misalignment carries disproportionate downstream risk that compounds across the entire program.
                          - paragraph:
                            - strong [ref=e358]: Data Integrity and Safety Surveillance
                            - text: Liver function monitoring, hepatic adverse event adjudication, and detection of drug-induced liver injury signals in patients with pre-existing hepatic disease require specialized data management and safety monitoring infrastructure that exceeds standard oncology capabilities. These are not edge cases — they are central to dataset integrity and regulatory credibility.
                          - paragraph: Johnson's Medical addresses each challenge directly with defined methodologies, qualified personnel, and experience-informed contingency frameworks.
