                        - textbox:
                          - paragraph: "Regulatory Strategy ## 6.1 Overview and Regulatory Philosophy Vericel BioPharma's HCC development program operates within a closely scrutinized, rapidly evolving oncology regulatory landscape. Global agencies—FDA, EMA, PMDA, NMPA, and Health Canada—have published indication-specific guidance and precedent-setting approvals that shape trial design, conduct, and submission requirements. [ORGANIZATION NAME] integrates regulatory strategy as a core program driver, not merely a compliance function. Our embedded regulatory team ensures every protocol decision—from eligibility criteria to endpoint selection to statistical methodology—aligns with end-state submission requirements. We provide proactive regulatory intelligence, enabling anticipatory decision-making rather than reactive adjustments. This section addresses: - Regulatory pathway assessment and submission management - Expedited designation strategy - Orphan drug considerations - Regional regulatory requirements - Risk-based monitoring and compliance oversight - Submission planning and preparation Note: Given unconfirmed study phase, compound mechanism, prior experience, and target geography, this strategy addresses the full range of plausible scenarios (Phase I through Phase III). Section-specific assumptions and [PLACEHOLDER] markers indicate items requiring sponsor confirmation. --- ## 6.2 Applicable Regulatory Framework ### 6.2.1 Governing Standards and Guidelines The study will comply with applicable standards across all relevant authorities: | Authority | Key Standards | |---|---| | ICH | E6(R2), E6(R3), E8(R1), E9(R1), E11, E14, E17, E19 (as applicable) | | FDA | 21 CFR Parts 11, 50, 54, 56, 312, 314, 600; HCC Guidance (2023); Oncology Endpoint Guidance | | EMA | EMA/CHMP/205/95; HCC reflection papers; Clinical Trials Regulation EU 536/2014 | | PMDA | Oncology Guidelines; Japan GCP Ordinance (MHW Ordinance No. 28) | | NMPA | Technical Guidance for Anti-tumor Clinical Trials (2021); Chinese GCP (2020) | | ICH E17 | Multi-Regional Clinical Trial design and subgroup considerations | | ICH M3(R2) | Nonclinical safety studies | Compliance with all local statutory requirements in participating countries will be ensured through our global regulatory network. ### 6.2.2 HCC-Specific Regulatory Context Advanced HCC presents a well-developed regulatory framework with key considerations: - Endpoint Evolution: FDA's 2023 HCC guidance prioritizes overall survival (OS) for regular approval, with objective response rate (ORR) and duration of response (DoR) supporting accelerated approval. Progression-free survival (PFS) and event-free survival (EFS) face increased scrutiny as surrogate endpoints. - Liver Function Stratification: Child-Pugh class stratification at randomization is required, with Child-Pugh A as the primary population. Child-Pugh B inclusion requires justification and dedicated safety monitoring. ALBI score is increasingly referenced as an objective complement. - Etiology Considerations: Agencies scrutinize population representativeness relative to HBV versus NASH/alcohol-associated HCC prevalence. Protocol stratification and subgroup analyses require regulatory alignment. - Combination Therapy Benchmarks: Approvals of atezolizumab/bevacizumab and durvalumab/tremelimumab establish efficacy benchmarks that agencies reference during review. Competitive positioning will influence approval magnitude expectations. [PLACEHOLDER: Confirmation of investigational compound mechanism, prior regulatory interactions, and IND/CTA status required.] --- ## 6.3 Regulatory Pathway Assessment ### 6.3.1 U.S. Regulatory Pathway The primary U.S. pathway will be determined by confirmed study phase and compound characteristics: | Scenario | Pathway | Framework | |---|---|---| | Phase I/IIa | IND | Safety reporting, dose escalation; 21 CFR Part 312 | | Phase II randomized efficacy | IND | ORR/DoR primary endpoints | | Phase III registrational | NDA/BLA | OS or co-primary OS/ORR; 21 CFR Part 314/600 | [PLACEHOLDER: Confirmation of study phase and mechanism required to specify pathway.]"
