                        - textbox:
                          - paragraph: "Proposed Team & Organizational Structure ## 5. Proposed Team & Organizational Structure ### 5.1 Organizational Philosophy Advanced hepatocellular carcinoma presents distinct clinical challenges: heterogeneous patient populations, hepatic comorbidities, evolving competitive therapies, and complex safety monitoring requirements. [ORGANIZATION NAME] addresses these demands through senior-led specialty expertise, not generalist support. Our approach: - Dedicated specialists: Every team member assigned to this program brings direct HCC or hepato-oncology experience; no shared resources or therapeutic area consultants. - Sponsor-embedded model: Designated personnel function as integrated extensions of Vericel's development organization—accountable, accessible, and strategically aligned from initiation through regulatory submission. - Structured governance: All roles operate under ICH E6(R2)/E6(R3) compliance frameworks with explicit TMF documentation, defined escalation pathways, and quality oversight responsibilities. --- ### 5.2 Organizational Structure Vericel BioPharma (Sponsor) │ ├── Executive Sponsor (VP, Clinical Development – Oncology) │ └── Quarterly Business Reviews &amp; Executive Escalation │ └── Global Program Director ├── Global Project Manager │ └── Operational Execution &amp; Timeline Accountability │ ├── Global Medical Monitor │ ├── Safety Reporting &amp; SUSAR Management │ └── Pharmacovigilance Lead │ ├── Regulatory Affairs Lead │ └── Regional Regulatory Strategists [Regions TBD] │ ├── Global Clinical Operations Lead │ ├── Regional Clinical Operations Managers [Regions TBD] │ └── Clinical Research Associates (Site-Level) │ ├── Biostatistics &amp; Data Management │ ├── Statistical Programming Lead │ └── Database Programming Team │ ├── Central Laboratory Liaison [Partner TBD] │ └── Quality Assurance Lead └── Independent GCP Auditors Note: Final regional structure, RCOM count, and CRA-to-site ratios will be confirmed upon specification of target countries, site numbers, and study phase (see Section 5.8 for clarification dependencies). --- ### 5.3 Senior Leadership Roles #### 5.3.1 Executive Sponsor Liaison Title: Vice President, Clinical Development – Oncology Accountability: Strategic executive alignment Serves as the senior escalation interface between [ORGANIZATION NAME] and Vericel leadership. Resolves scope/contractual disputes requiring executive authority; ensures program-level strategic alignment. Chairs quarterly Business Reviews and maintains standing access to Vericel's CMO and Head of Clinical Development. [PLACEHOLDER: Name, credentials, biography pending internal assignment] --- #### 5.3.2 Global Program Director (GPD) Title: Global Program Director, Oncology Accountability: End-to-end program delivery (scope, timeline, quality, budget) The GPD owns ultimate program accountability and serves as the primary senior relationship owner with Vericel's Clinical Development and Operations leadership. Required Experience: - Minimum 10 years oncology clinical research leadership - Direct experience managing HCC or gastroenterology-oncology programs through Phase [PLACEHOLDER: confirm] completion - Multi-regional program management and cross-functional integration Core Responsibilities: - Program governance, milestone tracking, and risk ownership - Contract management and budget stewardship - Cross-functional coordination (Medical, Regulatory, Operations, Biostatistics, Data Management) - Vendor oversight (central lab, IVRS/IWRS, monitoring services) - Monthly Governance Meetings with Vericel leadership - Documented risk identification and mitigation strategies [PLACEHOLDER: Name, credentials, years of oncology experience, biography pending internal confirmation] --- #### 5.3.3 Global Project Manager (GPM) Title: Global Project Manager, Oncology Accountability: Day-to-day operational execution The GPM is the operational engine, managing the integrated project plan, timeline accountability, deliverable tracking, and risk register. Primary daily contact for Vericel's project management counterparts. Core Responsibilities: - Integrated project planning and timeline management - Weekly operational status reporting and escalation - Risk register maintenance and mitigation tracking - Vendor coordination and performance monitoring - Deliverable quality assurance prior to sponsor delivery [PLACEHOLDER: Name, credentials, project management background pending internal confirmation] --- #### 5.3.4 Global Medical Monitor (GMM) Title: Global Medical Monitor, Oncology Accountability: Clinical safety, medical oversight, and regulatory readiness Reports functionally to the GPD and maintains a direct safety reporting line to Vericel's Chief Medical Officer. Responsible for all medical and safety governance across the program. Required Experience: - Physician or advanced-degree clinical professional (MD, DO, NP, PA, or PharmD) - Minimum 8 years oncology clinical research or medical oncology background - Direct experience with HCC patient populations and hepatic safety monitoring Core Responsibilities: - Protocol safety review and ongoing safety surveillance - SUSAR (Suspected Unexpected Serious Adverse Reaction) assessment and reporting timelines - Site safety training and site audit medical oversight - Medical interpretation of laboratory and clinical findings - Regulatory correspondence support (safety-related submissions) - Ongoing clinical and safety trending analysis [PLACEHOLDER: Name, credentials, clinical background pending internal confirmation] --- #### 5.3.5 Regulatory Affairs Lead Title: Regulatory Affairs Lead, Oncology Accountability: Regulatory strategy, submissions, and compliance Leads all regulatory submissions, strategy documentation, and compliance activities. Maintains primary contact with regulatory authorities on behalf of Vericel. Required Experience: - Minimum 10 years regulatory affairs in oncology (or related therapeutic area) - Direct IND/CTA and post-approval submission experience - Demonstrated expertise in hepatic oncology regulatory pathways (ICH, FDA, EMA) Core Responsibilities: - IND safety reports, annual reports, and regulatory submissions - Regulatory strategy documentation and authority correspondence - Regional regulatory alignment (ICH/FDA/EMA/others as applicable) - Protocol amendment coordination and submission"
