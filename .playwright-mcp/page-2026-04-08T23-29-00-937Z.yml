                          - paragraph: "Section 4: Scope of Work & Service Delivery ## 4.1 Service Delivery Model [PRIME CRO NAME] will provide full-service clinical development support for Vericel BioPharma's Advanced Hepatocellular Carcinoma program, encompassing regulatory strategy, site activation, patient enrollment, study conduct, safety management, and regulatory submission. All services will be delivered in accordance with ICH E6(R2) GCP guidelines and applicable regulations across the FDA, EMA, and participating jurisdictions. Conditional Scope Assumption: This proposal is based on a Phase II/III randomized oncology trial with [PLACEHOLDER: target enrollment]. Upon receipt of final protocol specifications, [PRIME CRO NAME] will confirm resource allocation and delivery timelines within [PLACEHOLDER: number] business days. ## 4.2 Core Service Delivery Framework | Function | Scope | Responsibility | Service Model | |---|---|---|---| | Program Management | End-to-end study oversight and governance | [PRIME CRO NAME] | Dedicated team with TA expertise | | Regulatory Affairs | IND strategy, submissions, communications, and compliance | [PRIME CRO NAME] | Centralized + regional support | | Site Network & Activation | Site identification, feasibility, contracting, and initiation | [PRIME CRO NAME] | Proprietary oncology network | | Clinical Monitoring | Source data verification, protocol compliance, and query resolution | [PRIME CRO NAME] | Risk-based monitoring strategy | | Data Management & Biostatistics | EDC, DSMB support, database lock, and statistical analysis | [PRIME CRO NAME] | Integrated platform | | Safety & Medical Monitoring | Real-time safety oversight, SAE reporting, and DSMB coordination | [PRIME CRO NAME] | 24/7 global operations center | | Patient Recruitment & Retention | Enrollment strategy, retention programs, and site support | [PRIME CRO NAME] | Integrated recruitment services | | Quality & Compliance | GCP audits, CAPA management, and regulatory inspection readiness | [PRIME CRO NAME] | Proactive quality program | | Central Laboratory | Specimen collection, testing, and result management | [PLACEHOLDER: TBD] | [PLACEHOLDER: TBD] | | Imaging Core Lab | RECIST 1.1/mRECIST assessment and reporting | [PLACEHOLDER: TBD] | [PLACEHOLDER: TBD] | | Biomarker & Translational Services | Sample handling, analysis, and biomarker reporting | [PLACEHOLDER: TBD] | [PLACEHOLDER: TBD] | | IRT/IWRS | Drug randomization and patient tracking | [PRIME CRO NAME]/Vendor | Validated, validated technology platform | | Clinical Supply Management | Drug manufacturing, logistics, temperature control, and inventory | [PLACEHOLDER: TBD] | [PLACEHOLDER: TBD] | | Medical Writing | Regulatory submissions, CSR, and publication support | [PRIME CRO NAME] | Regulatory-compliant deliverables | ## 4.3 Program Management & Governance Structure ### 4.3.1 Organizational Leadership [PRIME CRO NAME] will assign a Senior Program Director with demonstrated HCC/oncology expertise as the single point of accountability. The SPD will lead a structured team including: - Project Manager (day-to-day operations) - Regional Feasibility Lead (site network & activation) - Clinical Operations Lead (monitoring & protocol compliance) - Functional leads (Data, Safety, Regulatory) All core team assignments will be documented in a formal Resource Allocation Plan within [PLACEHOLDER: number] business days of contract execution. ### 4.3.2 Governance Framework Joint Steering Committee (JSC) - Frequency: [PLACEHOLDER: Monthly/Quarterly] - Purpose: Strategic oversight, enrollment trajectory, risk management, regulatory alignment - Attendees: C-level sponsors, Program Director, functional leads - Deliverable: Executive summary with risk dashboard and decisions log Joint Operations Committee (JOC) - Frequency: Weekly during study initiation; [PLACEHOLDER: bi-weekly/monthly] thereafter - Purpose: Operational performance, site metrics, data quality, issue resolution - Attendees: Program Manager, site leads, data/safety/regulatory leads - Deliverable: Formal minutes with action items and escalations within 48 hours Functional Working Groups - Convened ad-hoc for Data Management, Safety, Regulatory, and Operations - Escalation matrix maintained and reviewed at each JOC ### 4.3.3 Real-Time Visibility & Reporting [PRIME CRO NAME] will provide sponsor access to a centralized, cloud-based study dashboard featuring: - Enrollment & Site Performance: Real-time enrollment velocity, site activation status, patient screening-to-randomization rates - Data Quality Metrics: Query aging, monitoring completion rates, data lock timeline - Safety Tracking: SAE timelines, causality assessments, DSMB preparation metrics - Operational Compliance: Protocol deviation trending, monitoring findings, audit readiness indicators Monthly Executive Dashboards will synthesize KPIs against pre-agreed targets, with trend analysis and mitigation recommendations."
