                        - textbox:
                          - paragraph: "Quality Management --- ## 7.1 Quality Management Philosophy and Framework Our Quality Management approach for the Vericel BioPharma Advanced Hepatocellular Carcinoma (HCC) program is grounded in a risk-based, proactive quality philosophy aligned with ICH E6(R2)/E6(R3), ICH E8(R1), and applicable FDA (21 CFR Parts 11, 50, 54, 56, and 312) and EMA regulatory frameworks. We do not treat quality as an endpoint audit function; rather, quality is embedded at every operational layer — from protocol feasibility through database lock — as a continuous, prospective discipline. Our Quality Management System (QMS) for this program will be built on three governing principles: | Principle | Description | |---|---| | Prevention Over Detection | Quality risks are identified and mitigated prospectively, not remediated reactively after data integrity events | | Risk Proportionality | Oversight intensity scales dynamically to the criticality of data, the vulnerability of processes, and site-specific performance profiles | | Transparency and Partnership | Vericel BioPharma will have real-time visibility into quality metrics, risk signals, and corr amplifies the importance of a rigorous quality infrastructure. Patients with underlying hepatic dysfunction, comorbid portal hypertension, thrombocytopenia, and variable Child-Pugh/ALBI status present significant data capture challenges. Eligibility criteria violations, hepatic adverse event misclassification, and inconsistent functional scoring represent quality risks that are not merely administrative in nature — they are scientifically consequential. Our QMS is designed specifically to address these oncology- and hepatology-specific vulnerabilities. --- ## 7.2 Quality Management Plan A program-specific Quality Management Plan (QMP) will be developed collaboratively with Vericel BioPharma prior to study initiation and will govern all quality activities throughout the trial lifecycle. The QMP will be a living document, subject to scheduled formal review at each major study milestone and unscheduled review when triggered by quality signals or protocol amendments. ### 7.2.1 QMP Core Components The QMP will formally document and operationalize the following: - Critical Data and Critical Processes: Explicit identification of data elements and operational processes that are essential to the trial's primary endpoints, regulatory submissions, and patient safety determinations. For this HCC program, critical data elements will include, but are not limited to: eligibility confirmation (Child-Pugh/ALBI scoring, prior systemic therapy, BCLC stage), tumor response assessments per [PLACEHOLDER: applicable response criteria, e.g., RECIST v1.1, mRECIST, iRECIST], hepatic adverse event grading (per CT consent documentation integrity. - Risk Assessment Methodology: A structured risk identification and scoring framework applied at the protocol, site, and process levels, using a probability × impact × detectability model consistent with ICH E6(R3) quality risk management principles. - Risk Mitigation and Contingency Actions: Pre-specified mitigation strategies for each identified risk tier, including escalation thresholds and responsible ownership. - Quality Tolerance Limits (QTLs): Predefined thresholds for key quality indicators at both the study and site levels, triggering mandatory escalation and remediation when breached. - Monitoring Strategy Integration: Alignment of the QMP with the Risk-Based Monitoring (RBM) plan, including centralized monitoring triggers and on-site visit decision logic. - Roles and Responsibilities Matrix: Clear delineation of quality ownership across CRO functional groups, sponsor quality counterparts, and third-party vendors. The QMP will be finalized no later than [PLACEHOLDER: number of weeks, e.g., four weeks] prior to first site initiation visit (SIV) and will require formal written approval by both the CRO Quality Assurance (QA) leadership and the Vericel BioPharma study team. --- ## 7.3 Risk-Based Monitoring Strategy ### 7.3.1 Strategic Rationale In accordance with ICH E6(R2) Section 5.18 and the FDA's guidance A Risk-Based Approach to Monitoring of Clinical Investigations (August 2013), as well as the EMA's Reflection Paper on Risk-Based Quality Management in Clinical Trials* — integrating centralized statistical monitoring (CSM) with targeted on-site monitoring — with the balance between remote and on-site activity determined by site risk profiles, data signals, and study phase requirements. This is not a cost-reduction exercise. The hybrid model is scientifically superior for detecting systematic errors, data entry inconsistencies, and protocol deviations that are not visible during periodic on-site visits. It also enables continuous oversight between site visits, which is essential in an HCC population where patient status can deteriorate rapidly and protocol deviations may have immediate safety implications. ### 7.3.2 Centralized Statistical Monitoring (CSM) Our centralized monitoring program will deploy validated analytical algorithms against the accumulating clinical database on a [PLACEHOLDER: frequency, e.g., bi-weekly] basis. CSM activities will include: Data Quality Analytics: - Missing data rate monitoring by site, by data domain, and by visit window - Query aging and resolution velocity tracking - Enrollment rate and screen failure rate surveillance, with HCC-specific analysis of eligibility criterion failure patterns (e.g., Child-Pugh B vs. A, ECOG performance status distribution) Statistical Outlier Detection: - Site-level data distributions compared to the overall study population for key efficacy and safety parameters - Intra-site consistency checks (e.g., implausible vital sign sequences, duplicate laboratory values per protocol] - Hepatic function laboratory trends (ALT, AST, bilirubin, INR, albumin) reviewed for anomalous clustering Protocol Deviation Surveillance: - Real-time flagging of critical protocol deviations (CPDs) as they are entered into the EDC system - Trend analysis distinguishing systematic site-level deviations from isolated subject-level events - Eligibility deviation pattern monitoring — given the clinical complexity of"
