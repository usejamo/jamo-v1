                          - paragraph: "Budget & PricingSection 7: Budget & Pricing7.1 Preamble and Basis of EstimateThe following budget has been developed in good faith based on the information available within the Request for Proposal (RFP) materials submitted by Vericel BioPharma, Inc., and the assumptions documented herein. Given that several critical study parameters remain undefined at the time of proposal preparation — including study phase, target enrollment, geographic scope, investigational compound characteristics, and primary endpoint(s) — this budget represents a preliminary, indicative cost framework rather than a binding financial commitment. A final, binding budget will be issued upon receipt of complete study specifications, sponsor confirmation of all open assumptions, and completion of a formal scope alignment meeting."
                          - paragraph: All cost estimates presented below reflect Johnson's Medical's current standard rate card, effective Q2 2026, and are subject to annual escalation terms as described in Section 7.9.
                          - paragraph: "Interpretation Note: In the absence of a confirmed study phase, this budget has been structured to accommodate a Phase II/III oncology registrational program for Advanced HCC, which is the most operationally probable scenario given the therapeutic context and sponsor stage of development. Should the confirmed phase differ materially, cost categories, site numbers, monitoring intensity, and regulatory obligations will be revised accordingly."
                          - paragraph: 7.2 Fundamental Assumptions Governing This BudgetThe cost estimates presented in this section are predicated on the following assumptions. Any deviation from these assumptions — whether identified during scope alignment or arising during study conduct — will be managed through the Change Order process described in Section 7.10.
