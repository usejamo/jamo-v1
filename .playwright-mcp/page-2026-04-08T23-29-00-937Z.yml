cribed in Section 7.10.</p> <table border=\"1\" cellpadding=\"8\" cellspacing=\"0\" style=\"width:100%; border-collapse:collapse;\"> <thead style=\"background-color:#f2f2f2;\"> <tr> <th>#</th> <th>Assumption Category</th> <th>Assumption Statement</th> </tr> </thead> <tbody> <tr> <td>1</td> <td>Study Phase</td> <td>Phase II/III oncology registrational trial in Advanced HCC; final phase designation to be confirmed by sponsor at scope alignment meeting</td> </tr> <tr> <td>2</td> <td>Study Design</td> <td>Randomized, open-label, active-controlled, multicenter trial; two-arm design unless sponsor confirms otherwise</td> </tr> <tr> <td>3</td> <td>Target Enrollment</td> <td>Approximately 300–450 subjects across all investigational sites; final enrollment target subject to statistical power confirmation from sponsor biostatistics</td> </tr> <tr> <td>4</td> <td>Number of Sites</td> <td>Approximately 60–90 sites globally; final site count to be determined following feasibility assessment</td> </tr> <tr> <td>5</td> <td>Geographic Scope</td> <td>North America, European Union, Asia-Pacific (including Japan, South Korea, and China), and select markets in the Middle East and North Africa; subject to regulatory feasibility and enrollment velocity modeling</td> </tr> <tr> <td>6</td> <td>Study Duration</td> <td>Approximately 48–60 months from study startup through database lock, inclusive of enrollment period and minimum follow-up requirements for primary endpoint maturity</td> </tr> <tr> <td>7</td> <td>Treatment Duration</td> <td>Approximately 12 months per subject on average; treatment continues until disease progression, unacceptable toxicity, or withdrawal of consent per protocol</td> </tr> <tr> <td>8</td> <td>Primary Endpoint</td> <td>Overall Survival (OS) as primary endpoint; Progression-Free Survival (PFS) per RECIST 1.1 as key secondary endpoint; final endpoint hierarchy to be confirmed by sponsor</td> </tr> <tr> <td>9</td> <td>Investigational Product</td> <td>Sponsor retains full responsibility for IMP manufacture, labeling, packaging, release testing, and primary distribution to depot or site level; Johnson's Medical assumes depot-to-site logistics coordination only</td> </tr> <tr> <td>10</td> <td>Comparator Arm</td> <td>Active comparator arm assumed (e.g., sorafenib or lenvatinib as standard of care); open-label design; no placebo matching required unless sponsor requests double-dummy design</td> </tr> <tr> <td>11</td> <td>Regulatory Strategy</td> <td>IND maintenance, annual reporting, and protocol amendment submissions in the United States; CTA submissions and maintenance across EU member states; parallel EMA Scientific Advice assumed; NDA/BLA and MAA submission support included in scope</td> </tr> <tr> <td>12</td> <td>Central Laboratory</td> <td>Single global central laboratory; Johnson's Medical preferred vendor network will be applied unless sponsor nominates a specific laboratory provider at scope alignment</td> </tr> <tr> <td>13</td> <td>Imaging</td> <td>Centralized independent radiology review required; tumor assessments per RECIST 1.1; imaging vendor to be selected through competitive bid process; imaging reads budgeted at every 8 weeks per subject during treatment phase</td> </tr> <tr> <td>14</td> <td>Sponsor Responsibilities</td> <td>Sponsor retains responsibility for IMP manufacture and quality release, IND/CTA filing fees, DSMB charter development and DSMB member honoraria, insurance and indemnification, and any compassionate use or expanded access programs</td> </tr> <tr> <td>15</td> <td>Pass-Through Costs</td> <td>All third-party pass-through costs are estimated at current market rates and will be invoiced at actual cost with no markup unless otherwise stated; significant variances greater than 10% will be flagged via formal Change Order</td> </tr> <tr> <td>16</td> <td>Currency</td> <td>All figures expressed in United States Dollars (USD); foreign currency costs estimated using exchange rates current as of Q2 2026; currency fluctuation risk beyond ±5% over any rolling 12-month period will be addressed through the Change Order process</td> </tr> <tr> <td>17</td> <td>Investigator Grants</td> <td>Site payments and investigator grants are <strong>excluded</strong> from this budget and are the financial responsibility of the sponsor; estimated ranges are provided in Section 7.8.4 for sponsor planning purposes</td> </tr> <tr> <td>18</td> <td>Enrollment Velocity</td> <td>Assumed screen failure rate of 35–45% based on historical HCC trial benchmarks; estimated enrollment duration of 18–24 months at projected screen rates; enrollment ramp-up period of 3–6 months following first site activation factored into resource planning</td> </tr> <tr> <td>19</td> <td>Subject Discontinuation</td> <td>Estimated 15–20% subject discontinuation rate prior to primary endpoint assessment; dropout assumptions are incorporated into sample size planning and monitoring frequency modeling</td> </tr> <tr> <td>20</td> <td>Biomarker and Translational Research</td> <td>Exploratory biomarker program assumed; tissue and liquid biopsy sample collection, processing, and storage included in central laboratory scope; downstream biomarker analysis costs are excluded pending sponsor confirmation of biomarker strategy</td> </tr> </tbody> </table> <hr/> <h3>7.3 Budget Summary — High-Level Overview</h3> <p>The table below presents the top-level cost summary by functional category. Detailed breakdowns for each category are provided in Sections 7.4 through 7.8.</p> <table border=\"1\" cellpadding=\"8\" cellspacing=\"0\" style=\"width:100%; border-collapse:collapse;\"> <thead style=\"background-color:#f2f2f2;\"> <tr> <th>Cost Category</th> <th>Estimated Cost (USD)</th> <th>% of Total Budget</th> </tr> </thead> <tbody> <tr> <td><strong>7.4 Project Management &amp; Strategic Oversight</strong></td> <td>[PLACEHOLDER: $XXX,XXX]</td> <td>[PLACEHOLDER: X%]</td> </tr> <tr> <td><strong>7.5 Clinical Operations &amp; Site Management</stron