          - generic [ref=e439]: "<hr> <p><strong>Prepared for:</strong> Vericel BioPharma, Inc.<br> <strong>Prepared by:</strong> [ORGANIZATION NAME CRO]<br> <strong>Proposal Reference Number:</strong> [PLACEHOLDER: Internal proposal reference number]<br> <strong>Date of Submission:</strong> May 1, 2026<br> <strong>Proposal Version:</strong> 1.0<br> <strong>Confidentiality Classification:</strong> Strictly Confidential — For Authorized Recipients Only</p> <hr> <h2>Our Commitment to Vericel BioPharma</h2> <p>[ORGANIZATION NAME CRO] is pleased to present this proposal in response to Vericel BioPharma, Inc.'s request for clinical research organization services supporting its advanced hepatocellular carcinoma (HCC) program. We approach this engagement not as a vendor fulfilling a service brief, but as a development partner prepared to share accountability for the scientific, operational, and regulatory outcomes that will determine the future of this asset.</p> <p>Advanced HCC is one of the most demanding oncology indications in clinical development. Patients present with underlying hepatic dysfunction, comorbid portal hypertension, and etiologically heterogeneous disease that varies substantially across geographies — each factor introducing meaningful complexity to enrollment feasibility, data integrity, and regulatory interpretation. The treatment landscape has been fundamentally reshaped by immune checkpoint inhibitor combinations, raising the evidentiary bar and intensifying competitive pressure across global trial sites. We do not underestimate the weight of this context, and our proposal is designed accordingly.</p> <p>[ORGANIZATION NAME CRO] brings to this engagement a purpose-built oncology infrastructure, a demonstrated track record in hepatic malignancy programs, and the therapeutic area depth required to anticipate challenges before they become delays. Every element of the program design presented in this proposal — from regulatory strategy to site selection, from data governance to safety surveillance — has been calibrated specifically to the complexities of advanced HCC and to the strategic objectives we understand Vericel BioPharma to hold for this asset.</p> <hr> <h2>The Opportunity and the Challenge</h2> <p>Advanced HCC is the third leading cause of cancer mortality worldwide and accounts for 75–85% of all primary liver cancers. Despite meaningful recent advances in the treatment landscape, durable response rates remain limited and the unmet medical need for novel, differentiated therapeutic options remains substantial. For Vericel BioPharma's investigational program to achieve its full potential — whether through regular approval supported by overall survival (OS) data or through an accelerated pathway anchored by objective response rate (ORR) and duration of response — the clinical development program must be executed with scientific rigor, geographic intelligence, and regulatory precision from the first day of engagement.</p> <p>The operational and strategic challenges inherent to this program are significant and merit direct acknowledgment:</p> <ul> <li><strong>Patient Population Complexity:</strong> Child-Pugh and ALBI stratification requirements, combined with etiology-driven subgroup representation obligations, demand specialized oncology infrastructure and experienced investigators accustomed to managing medically fragile patients within the context of experimental therapy.</li> <li><strong>Competitive Enrollment Environment:</strong> Active enrollment pressure from multiple concurrent HCC trials across global sites demands proactive, intelligence-driven site selection and differentiated engagement strategies to secure investigator commitment and ensure reliable patient access throughout the enrollment period.</li> <li><strong>Evolving Regulatory Landscape:</strong> FDA, EMA, PMDA, and NMPA each maintain nuanced and evolving expectations for HCC trial design, endpoint selection, and liver function representa